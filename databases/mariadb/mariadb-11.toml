name = "mariadb"
version = "11.4.5"
type = "database"

homepage = "https://mariadb.org"
license = "GPL-2.0"

# CLI clients get shims; the server (bin/mariadbd.exe) is launched by Cove.
# Zip wraps under mariadb-<ver>-winx64/ (stripped).
bin = [
  "bin/mariadb.exe",
  "bin/mysql.exe",
  "bin/mysqldump.exe",
]

[service]
name = "cove-mariadb"
port = 3306

[architecture.x64]
url = "https://archive.mariadb.org/mariadb-11.4.5/winx64-packages/mariadb-11.4.5-winx64.zip"
hash = ""
